<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK Stock AI Dashboard - Top 30</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
font-family:-apple-system,"PingFang HK","Microsoft YaHei",sans-serif;
background:linear-gradient(135deg,#f4f7f9 0%,#e8eef2 100%);
margin:0;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.12);
max-width:1200px;
margin:auto;
}

.header{
border-left:5px solid #ff4d4f;
padding-left:15px;
margin-bottom:20px;
}

.header h2{
margin:0;
color:#262626;
font-size:24px;
}

.header p{
color:#8c8c8c;
font-size:13px;
margin:5px 0 0 0;
}

#alerts{
margin-bottom:20px;
min-height:30px;
}

.alert-tag{
display:inline-block;
padding:8px 14px;
margin:4px;
border-radius:6px;
font-size:13px;
font-weight:600;
border:1px solid #ddd;
background:#f9f9f9;
transition:all .3s;
}

.alert-tag:hover{
transform:translateY(-2px);
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.tag-critical{
background:#fff1f0;
border-color:#ffa39e;
color:#cf1322;
animation:pulse 1.5s infinite;
}

.tag-warning{
background:#fff7e6;
border-color:#ffd591;
color:#d46b08;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.85}
100%{opacity:1}
}

.chart-box{
height:950px;
margin-top:20px;
position:relative;
padding:10px;
background:#fafafa;
border-radius:8px;
}

.loading{
text-align:center;
padding:40px;
color:#8c8c8c;
}

.spinner{
border:3px solid #f3f3f3;
border-top:3px solid #1890ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.error-msg{
background:#fff2f0;
border:1px solid #ffccc7;
color:#cf1322;
padding:15px;
border-radius:6px;
margin-top:20px;
font-size:14px;
}

@media(max-width:768px){

.chart-box{height:1200px}

.header h2{font-size:20px}

}
</style>
</head>

<body>

<div class="card">

<div class="header">
<h2>📊 港股 AI 資金監控看板 (Top 30)</h2>
<p id="time">正在載入數據...</p>
</div>

<div id="alerts">
<div class="loading">
<div class="spinner"></div>
<p>數據載入中...</p>
</div>
</div>

<div class="chart-box">
<canvas id="myChart"></canvas>
</div>

</div>

<script>

const DATA_URL = "data.json";
let myChart = null;

async function loadData(){

try{

const response = await fetch(DATA_URL + "?t=" + Date.now());

if(!response.ok){
throw new Error(`HTTP ${response.status}`);
}

const data = await response.json();

if(!data.stocks || !Array.isArray(data.stocks)){
throw new Error("數據格式錯誤");
}

renderDashboard(data);

}catch(error){

console.error("載入失敗",error);
showError(error.message);

}

}

function renderDashboard(data){

const stocks = data.stocks || [];
const updateTime = data.update_time || "未知";

const timeElement = document.getElementById("time");

timeElement.innerText = `最後更新: ${updateTime}`;

const isAllZero = stocks.every(s => s.inflow===0 && s.short_today===0);

if(isAllZero){

timeElement.innerHTML += "<br><b style='color:#fa8c16'>⚠️ 數據源尚未發布</b>";

}

renderAlerts(stocks);

renderChart(stocks);

}

function renderAlerts(stocks){

const alertBox = document.getElementById("alerts");

alertBox.innerHTML="";

const alerts = stocks.filter(s => (s.insight || "") !== "✅ 正常");

if(alerts.length===0){

alertBox.innerHTML='<p style="color:#52c41a">✅ 目前無重大異動</p>';

return;

}

alerts.forEach(stock=>{

const tag=document.createElement("div");

if(stock.inflow>10){

tag.className="alert-tag tag-critical";

}else if(stock.inflow>5){

tag.className="alert-tag tag-warning";

}else{

tag.className="alert-tag";

}

tag.innerText=`${stock.name} (${stock.code}) : ${stock.insight} | 淨流入 ${stock.inflow}億`;

alertBox.appendChild(tag);

});

}

function renderChart(stocks){

const ctx=document.getElementById("myChart").getContext("2d");

const labels=stocks.map((s,i)=>{

const rankChange=s.rank_change||0;

let change="─";

if(rankChange>0) change=`↑${rankChange}`;
if(rankChange<0) change=`↓${Math.abs(rankChange)}`;

return `${i+1}. ${s.name} [${change}]`;

});

const inflowData=stocks.map(s=>s.inflow||0);
const shortData=stocks.map(s=>s.short_today||0);

const maxInflow=inflowData.length?Math.max(...inflowData.map(Math.abs)):10;
const maxShort=shortData.length?Math.max(...shortData):10;

if(myChart){myChart.destroy()}

myChart=new Chart(ctx,{

type:"bar",

data:{
labels:labels,

datasets:[

{
label:"南向資金淨流入 (億港元)",
data:inflowData,
backgroundColor:inflowData.map(v=>
v>10?"#ff4d4f":
v>0?"#ff7875":
v<-5?"#52c41a":
"#95de64"
),
xAxisID:"x1",
barThickness:14
},

{
type:"line",
label:"當日沽空比率 (%)",
data:shortData,
borderColor:"#1890ff",
backgroundColor:"rgba(24,144,255,0.1)",
borderWidth:2,
pointRadius:4,
xAxisID:"x2",
tension:.3
}

]

},

options:{

indexAxis:"y",
responsive:true,
maintainAspectRatio:false,
animation:false,

interaction:{
mode:"index",
intersect:false
},

scales:{

x1:{
type:"linear",
position:"bottom",
suggestedMin:Math.min(-5,-maxInflow-2),
suggestedMax:Math.max(15,maxInflow+2)
},

x2:{
type:"linear",
position:"top",
suggestedMin:0,
suggestedMax:Math.max(60,maxShort+5),
grid:{drawOnChartArea:false}
}

}

}

});

}

function showError(message){

document.getElementById("time").innerHTML=`❌ 載入失敗`;

document.getElementById("alerts").innerHTML=
`<div class="error-msg">
<strong>⚠️ 無法載入 data.json</strong><br>
${message}
</div>`;

document.querySelector(".chart-box").style.display="none";

}

loadData();

/* auto refresh every 5 minutes */
setInterval(loadData,300000);

</script>

</body>
</html>
