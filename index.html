<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HK Stock AI Dashboard - Top 30</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body{font-family:-apple-system,"PingFang HK","Microsoft YaHei",sans-serif;margin:0;padding:15px;background:#f4f7f9;}
.card{background:#fff;padding:20px;border-radius:12px;max-width:1200px;margin:auto;box-shadow:0 4px 20px rgba(0,0,0,0.12);}
.header{border-left:5px solid #ff4d4f;padding-left:15px;margin-bottom:20px;}
.header h2{margin:0;color:#262626;font-size:24px;}
.header p{color:#8c8c8c;font-size:13px;margin:5px 0 0 0;}
#alerts{margin-bottom:20px;min-height:30px;}
.alert-tag{display:inline-block;padding:8px 14px;margin:4px;border-radius:6px;font-size:13px;font-weight:600;border:1px solid #ddd;background:#f9f9f9;transition:all .3s;}
.alert-tag:hover{transform:translateY(-2px);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.tag-critical{background:#fff1f0;border-color:#ffa39e;color:#cf1322;animation:pulse 1.5s infinite;}
.tag-warning{background:#fff7e6;border-color:#ffd591;color:#d46b08;}
@keyframes pulse{0%{opacity:1}50%{opacity:.85}100%{opacity:1}}
.chart-box{height:950px;margin-top:20px;position:relative;padding:10px;background:#fafafa;border-radius:8px;}
.loading{text-align:center;padding:40px;color:#8c8c8c;}
.spinner{border:3px solid #f3f3f3;border-top:3px solid #1890ff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.error-msg{background:#fff2f0;border:1px solid #ffccc7;color:#cf1322;padding:15px;border-radius:6px;margin-top:20px;font-size:14px;}
@media(max-width:768px){.chart-box{height:1200px}.header h2{font-size:20px}}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h2>📊 港股 AI 資金監控看板 (Top 30)</h2>
    <p id="time">正在載入數據...</p>
  </div>

  <div id="alerts">
    <div class="loading">
      <div class="spinner"></div>
      <p>數據載入中...</p>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="myChart"></canvas>
  </div>
</div>

<script>
let myChart = null;
const DATA_URL = "data.json";

async function loadData(){
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(!data.stocks || !Array.isArray(data.stocks)) throw new Error("數據格式錯誤");
    renderDashboard(data);
  } catch(err){
    console.error("載入失敗", err);
    document.getElementById("time").innerHTML="❌ 載入失敗";
    document.getElementById("alerts").innerHTML=`<div class="error-msg"><strong>⚠️ 無法載入 data.json</strong><br>${err.message}</div>`;
    document.querySelector(".chart-box").style.display="none";
  }
}

function renderDashboard(data){
  const stocks = data.stocks;
  const timeElement = document.getElementById("time");
  timeElement.innerText = `最後更新: ${data.update_time}`;
  renderAlerts(stocks);
  renderChart(stocks);
}

function renderAlerts(stocks){
  const alertBox = document.getElementById("alerts");
  alertBox.innerHTML="";
  const alerts = stocks.filter(s=>s.insight!=="✅ 正常");
  if(alerts.length===0){
    alertBox.innerHTML='<p style="color:#52c41a">✅ 目前無重大異動</p>';
    return;
  }
  alerts.forEach(stock=>{
    const tag=document.createElement("div");
    tag.className= stock.short_today>10?"alert-tag tag-critical":
                   stock.short_today>5?"alert-tag tag-warning":"alert-tag";
    tag.innerText=`${stock.name} (${stock.code}) : ${stock.insight} | 沽空率 ${stock.short_today}%`;
    alertBox.appendChild(tag);
  });
}

function renderChart(stocks){
  const ctx=document.getElementById("myChart").getContext("2d");
  const labels=stocks.map((s,i)=>`${i+1}. ${s.name}`);
  const inflowData=stocks.map(s=>s.short_today);
  if(myChart) myChart.destroy();
  myChart=new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        label:"當日沽空比率 (%)",
        data:inflowData,
        backgroundColor:"#1890ff"
      }]
    },
    options:{
      indexAxis:"y",
      responsive:true,
      maintainAspectRatio:false,
      animation:false
    }
  });
}

// Auto refresh every 5 min
setInterval(loadData, 300000);
loadData();
</script>

</body>
</html>
