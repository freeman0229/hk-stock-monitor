<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>港股 AI 資金監控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0a0d12;
    --surface:   #111520;
    --border:    #1e2535;
    --muted:     #3a4460;
    --dim:       #6b7a9e;
    --text:      #c8d4f0;
    --bright:    #e8eeff;
    --red:       #ff4d6a;
    --red-dim:   rgba(255,77,106,0.12);
    --amber:     #ffb347;
    --amber-dim: rgba(255,179,71,0.12);
    --green:     #3dffa0;
    --green-dim: rgba(61,255,160,0.10);
    --blue:      #4d9fff;
    --blue-dim:  rgba(77,159,255,0.12);
    --purple:    #a78bfa;
    --accent:    #7c6aff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans HK', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 20px 60px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .wrap { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px; margin-bottom: 24px;
    flex-wrap: wrap; gap: 12px;
  }
  .logo-block { display: flex; align-items: center; gap: 14px; }
  .logo-pip {
    width: 5px; height: 44px;
    background: linear-gradient(180deg, var(--accent), var(--blue));
    border-radius: 3px; flex-shrink: 0;
  }
  .logo-text h1 { font-size: 19px; font-weight: 700; color: var(--bright); letter-spacing:.02em; }
  .logo-text p  { font-size: 11px; color: var(--dim); font-family:'DM Mono',monospace; letter-spacing:.05em; margin-top:3px; }
  #time-display { font-family:'DM Mono',monospace; font-size:12px; color:var(--dim); text-align:right; line-height:1.7; }
  #time-display .stale { color:var(--red); }
  #time-display .live  { color:var(--green); }

  /* ── KPI BAR ── */
  .kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
  .kpi {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px; transition:border-color .2s;
  }
  .kpi:hover { border-color:var(--muted); }
  .kpi .label { font-size:10px; color:var(--dim); font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:.08em; margin-bottom:7px; }
  .kpi .value { font-size:24px; font-weight:700; color:var(--bright); line-height:1; }
  .kpi .sub   { font-size:11px; color:var(--dim); margin-top:4px; }

  /* ── ALERTS ── */
  #alerts { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; min-height:34px; align-items:center; }
  .alert-chip {
    display:inline-flex; align-items:center; gap:7px;
    padding:6px 12px; border-radius:6px;
    font-size:12px; font-weight:500; border:1px solid;
    cursor:default; transition:transform .15s, box-shadow .15s;
    animation:fadeIn .3s ease both;
  }
  .alert-chip:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,.4); }
  .chip-red   { background:var(--red-dim);   border-color:rgba(255,77,106,.3);  color:#ff8099; }
  .chip-amber { background:var(--amber-dim); border-color:rgba(255,179,71,.3);  color:#ffc97a; }
  .chip-blue  { background:var(--blue-dim);  border-color:rgba(77,159,255,.3);  color:#7db8ff; }
  .chip-green { background:var(--green-dim); border-color:rgba(61,255,160,.3);  color:#5fffb8; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  /* ── LAYOUT ── */
  .main-layout { display:grid; grid-template-columns:1fr 400px; gap:14px; align-items:start; }

  .panel {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  .panel-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 18px; border-bottom:1px solid var(--border);
  }
  .panel-head h2 {
    font-size:13px; font-weight:500; color:var(--bright);
    display:flex; align-items:center; gap:8px;
  }
  .panel-head h2 .dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--accent); box-shadow:0 0 6px var(--accent);
  }

  .chart-wrap { padding:12px 16px 16px; position:relative; }

  /* ── TABLE ── */
  .tbl-wrap { overflow-x:auto; max-height:700px; overflow-y:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th {
    position:sticky; top:0; z-index:2; background:var(--surface);
    padding:9px 11px; text-align:right;
    font-family:'DM Mono',monospace; font-size:10px; font-weight:500;
    color:var(--dim); text-transform:uppercase; letter-spacing:.06em;
    border-bottom:1px solid var(--border); white-space:nowrap;
  }
  thead th:first-child, thead th:nth-child(2) { text-align:left; }
  tbody tr { border-bottom:1px solid rgba(30,37,53,.6); transition:background .12s; }
  tbody tr:hover { background:rgba(255,255,255,.025); }
  td { padding:8px 11px; color:var(--text); text-align:right; white-space:nowrap; }
  td:first-child { text-align:left; }
  td:nth-child(2) { text-align:left; color:var(--bright); font-weight:500; }

  .mono { font-family:'DM Mono',monospace; }
  .code-cell { color:var(--dim); font-family:'DM Mono',monospace; font-size:11px; }

  .badge {
    display:inline-block; padding:2px 7px; border-radius:4px;
    font-size:10px; font-weight:600; white-space:nowrap;
  }
  .badge-red    { background:var(--red-dim);   color:#ff8099; }
  .badge-amber  { background:var(--amber-dim); color:#ffc97a; }
  .badge-blue   { background:var(--blue-dim);  color:#7db8ff; }
  .badge-green  { background:var(--green-dim); color:#5fffb8; }

  /* delta colouring */
  .pos { color:var(--green); }
  .neg { color:var(--red); }
  .neu { color:var(--dim); }

  .legend-row {
    display:flex; gap:14px; flex-wrap:wrap; align-items:center;
    padding:10px 16px; border-bottom:1px solid var(--border);
    font-size:11px; color:var(--dim); font-family:'DM Mono',monospace;
  }
  .leg-item { display:flex; align-items:center; gap:5px; }
  .leg-dot  { width:16px; height:10px; border-radius:2px; flex-shrink:0; }

  /* ── LOADER / ERROR ── */
  .loader {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:120px; gap:12px;
  }
  .spinner {
    width:32px; height:32px; border-radius:50%;
    border:2px solid var(--border); border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .err-box {
    background:var(--red-dim); border:1px solid rgba(255,77,106,.3);
    color:#ff8099; padding:14px; border-radius:8px; font-size:13px; margin:14px;
  }

  /* ── RESPONSIVE ── */
  @media(max-width:1000px) {
    .main-layout { grid-template-columns:1fr; }
    .kpi-row { grid-template-columns:repeat(3,1fr); }
  }
  @media(max-width:600px) {
    .kpi-row { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-block">
      <div class="logo-pip"></div>
      <div class="logo-text">
        <h1>港股 AI 資金監控看板</h1>
        <p>HKEX DAILY QUOTATION · SHORT SELLING · CCASS SOUTHBOUND · TOP 30</p>
      </div>
    </div>
    <div id="time-display">正在載入…</div>
  </header>

  <div class="kpi-row" id="kpi-row">
    <div class="kpi"><div class="loader"><div class="spinner"></div></div></div>
    <div class="kpi"><div class="loader"><div class="spinner"></div></div></div>
    <div class="kpi"><div class="loader"><div class="spinner"></div></div></div>
    <div class="kpi"><div class="loader"><div class="spinner"></div></div></div>
    <div class="kpi"><div class="loader"><div class="spinner"></div></div></div>
  </div>

  <div id="alerts">
    <div class="loader"><div class="spinner"></div><span style="color:var(--dim);font-size:12px">載入警報…</span></div>
  </div>

  <div class="main-layout">

    <!-- LEFT: Chart -->
    <div class="panel">
      <div class="panel-head">
        <h2><span class="dot"></span>Top 30 成交股 — 綜合對比</h2>
      </div>
      <div class="legend-row" id="legend-row"></div>
      <div class="chart-wrap" id="chart-wrap">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- RIGHT: Table -->
    <div class="panel">
      <div class="panel-head">
        <h2><span class="dot"></span>個股明細</h2>
      </div>
      <div class="tbl-wrap" id="tbl-wrap">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
const DATA_URL = 'data.json';
let chart = null;
let stocks = [];

// ── FETCH ──────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.stocks?.length) throw new Error('數據格式錯誤');
    stocks = data.stocks;
    renderAll(data);
  } catch(err) {
    document.getElementById('time-display').innerHTML = '<span class="stale">❌ 載入失敗</span>';
    document.getElementById('alerts').innerHTML = `<div class="err-box">⚠️ 無法載入 data.json：${err.message}</div>`;
    document.getElementById('kpi-row').innerHTML = '';
    document.getElementById('tbl-wrap').innerHTML = `<div class="err-box">請確認 data.json 已更新。</div>`;
    document.getElementById('chart-wrap').innerHTML = '';
  }
}

function renderAll(data) {
  setTime(data.update_time);
  renderKPIs(data.stocks);
  renderAlerts(data.stocks);
  renderChart(data.stocks);
  renderTable(data.stocks);
}

// ── TIME ───────────────────────────────────────────────────────────────────
function setTime(ts) {
  const el = document.getElementById('time-display');
  const age = (Date.now() - new Date(ts.replace(' ','T'))) / 3600000;
  const cls = age > 4 ? 'stale' : 'live';
  el.innerHTML = `<span class="${cls}">${age > 4 ? '⚠' : '●'} 最後更新</span><br><span style="color:var(--bright)">${ts}</span>`;
}

// ── KPIs ───────────────────────────────────────────────────────────────────
function renderKPIs(s) {
  const alerts     = s.filter(x => x.insight !== '✅ 正常').length;
  const avgShort   = (s.reduce((a,x)=>a+x.short_ratio,0)/s.length).toFixed(1);
  const avgShort5  = (s.reduce((a,x)=>a+x.short_avg5,0)/s.length).toFixed(1);
  const netCcass   = s.reduce((a,x)=>a+x.ccass_delta,0);
  const topSh      = s.slice().sort((a,b)=>b.short_ratio-a.short_ratio)[0];

  const fmt = n => n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(0)+'M' : n.toLocaleString();
  const fmtDelta = n => (n > 0 ? '+' : '') + (n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : n);

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi">
      <div class="label">異動股數</div>
      <div class="value" style="color:var(--amber)">${alerts}</div>
      <div class="sub">共 ${s.length} 隻監控</div>
    </div>
    <div class="kpi">
      <div class="label">今日均沽空率</div>
      <div class="value" style="color:var(--red)">${avgShort}%</div>
      <div class="sub">5日均 ${avgShort5}%</div>
    </div>
    <div class="kpi">
      <div class="label">最高沽空率</div>
      <div class="value" style="color:var(--red)">${topSh ? topSh.short_ratio : '--'}%</div>
      <div class="sub">${topSh ? topSh.name : '--'}</div>
    </div>
    <div class="kpi">
      <div class="label">CCASS 淨增持</div>
      <div class="value" style="color:${netCcass >= 0 ? 'var(--green)' : 'var(--red)'}">
        ${fmtDelta(netCcass)}
      </div>
      <div class="sub">Top 30 合計今日增減</div>
    </div>
    <div class="kpi">
      <div class="label">榜首成交額</div>
      <div class="value" style="color:var(--blue)">${fmt(s[0]?.turnover||0)}</div>
      <div class="sub">${s[0]?.name||'--'}</div>
    </div>
  `;
}

// ── ALERTS ─────────────────────────────────────────────────────────────────function renderAlerts(s) {
  const box = document.getElementById('alerts');
  const flagged = s.filter(x => x.insight !== '✅ 正常');
  if (!flagged.length) {
    box.innerHTML = '<span style="color:var(--green);font-size:13px">✅ 目前無重大異動</span>';
    return;
  }
  box.innerHTML = flagged.map(x => {
    const { chip } = insightStyle(x.insight);
    const typeLabel = STOCK_TYPE_LABEL[x.stock_type] || x.stock_type;
    const consec = x.ccass_consec || 0;
    const consecStr = consec !== 0 ? ` · 連續${Math.abs(consec)}s${consec > 0 ? '增' : '減'}持` : '';
    const tradeDateStr = (x.insight.includes('機構') || x.insight.includes('避險'))
      ? ` · 對應交易日 ${x.ccass_trade_date||''}` : '';
    return `
      <div class="alert-chip ${chip}">
        ${x.insight} <strong>${x.name}</strong>
        &nbsp;[${typeLabel}]&nbsp;·&nbsp;沽空率 ${x.short_ratio}%&nbsp;·&nbsp;CCASS Δ ${fmtSh(x.ccass_delta)}${consecStr}${tradeDateStr}
      </div>
    `;
  }).join('');
}

function fmtSh(n) {
  const s = n >= 0 ? '+' : '';
  if (Math.abs(n) >= 1e6) return s + (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return s + (n/1e3).toFixed(0) + 'K';
  return s + n;
}

// ── CHART COLOURS ──────────────────────────────────────────────────────────
const SHORT_LINE  = '#E24B4A';
const SHORT_DASH  = '#F09595';
const CCASS_LINE  = '#1D9E75';
const CCASS_DASH  = '#5DCAA5';

const BAR_FILL = {
  '正常':        '#378ADD55',
  '機構增持':    '#185FA555',
  '沽空偏低':    '#3B6D1155',
  '沽空偏高':    '#BA751755',
  '空頭平倉信號':'#D85A3055',
  '避険盤撤退':  '#D85A3055',
  '異常高沽空':  '#E24B4A55',
  '南向重候':    '#534AB755',
};
const BAR_BORDER = {
  '正常':        '#378ADD',
  '機構增持':    '#185FA5',
  '沽空偏低':    '#3B6D11',
  '沽空偏高':    '#BA7517',
  '空頭平倉信號':'#D85A30',
  '避険盤撤退':  '#D85A30',
  '異常高沽空':  '#E24B4A',
  '南向重候':    '#534AB7',
};

function renderChart(s) {
  const wrap   = document.getElementById('chart-wrap');
  const legRow = document.getElementById('legend-row');

  const h = s.length * 26 + 80;
  wrap.style.height = h + 'px';
  wrap.innerHTML = '<canvas id="mainChart"></canvas>';

  const labels   = s.map((x, i) => `${String(i+1).padStart(2,'0')} ${x.code} ${x.name}`);
  const turnover = s.map(x => Math.round(x.turnover / 1e6));
  const shortR   = s.map(x => x.short_ratio);
  const shortA   = s.map(x => x.short_avg5);
  const ccassD   = s.map(x => +(x.ccass_delta / 1e6).toFixed(2));
  const ccassA   = s.map(x => +(x.ccass_avg5  / 1e6).toFixed(2));

  const lineLeg = [
    { style: `background:${SHORT_LINE};height:2px;border-radius:1px;width:18px`,       label: '沽空率 今日' },
    { style: `border-top:2px dashed ${SHORT_DASH};height:0;width:18px;margin:5px 0`,  label: '沽空率 5日均' },
    { style: `background:${CCASS_LINE};height:2px;border-radius:1px;width:18px`,       label: 'CCASS Δ 今日' },
    { style: `border-top:2px dashed ${CCASS_DASH};height:0;width:18px;margin:5px 0`,  label: 'CCASS Δ 5日均' },
  ];
  const barLeg = [
    { fill: '#378ADD55', border: '#378ADD', label: '✅ 正常' },
    { fill: '#185FA555', border: '#185FA5', label: '🏦 機構增持' },
    { fill: '#3B6D1155', border: '#3B6D11', label: '📈 沽空偏低' },
    { fill: '#BA751755', border: '#BA7517', label: '📉 沽空偏高' },
    { fill: '#D85A3055', border: '#D85A30', label: '🚪 避險盤撤退 / ⚠️ 空頭平倉' },
    { fill: '#E24B4A55', border: '#E24B4A', label: '🚨 異常高沽空' },
    { fill: '#534AB755', border: '#534AB7', label: '🔥 南向重倉' },
  ];

  legRow.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:12px;width:100%;align-items:center">
      ${lineLeg.map(l => `
        <div class="leg-item">
          <div style="${l.style};flex-shrink:0"></div>
          <span>${l.label}</span>
        </div>`).join('')}
    </div>
    <div style="width:100%;height:1px;background:var(--border);margin:4px 0"></div>
    <div style="font-size:10px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;width:100%;margin-bottom:4px">成交額棒色 — 信號</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;width:100%;align-items:center">
      ${barLeg.map(l => `
        <div class="leg-item">
          <div style="width:12px;height:10px;border-radius:2px;background:${l.fill};border:1px solid ${l.border};flex-shrink:0"></div>
          <span>${l.label}</span>
        </div>`).join('')}
    </div>
  `;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('mainChart').getContext('2d'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar', label: '成交額 (百萬 HKD)',
          data: turnover,
          backgroundColor: s.map(x => BAR_FILL[x.insight]  || '#378ADD55'),
          borderColor:     s.map(x => BAR_BORDER[x.insight] || '#378ADD'),
          borderWidth: 1, borderRadius: 2, borderSkipped: false,
          xAxisID: 'xTurnover', order: 4,
        },
        {
          type: 'line', label: '沽空率 今日',
          data: shortR,
          borderColor: SHORT_LINE, backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: SHORT_LINE,
          tension: 0, xAxisID: 'xShort', order: 1,
        },
        {
          type: 'line', label: '沽空率 5日均',
          data: shortA,
          borderColor: SHORT_DASH, backgroundColor: 'transparent',
          borderWidth: 1.5, borderDash: [5, 4], pointRadius: 2, pointBackgroundColor: SHORT_DASH,
          tension: 0, xAxisID: 'xShort', order: 2,
        },
        {
          type: 'line', label: 'CCASS Δ 今日 (M股)',
          data: ccassD,
          borderColor: CCASS_LINE, backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: CCASS_LINE,
          tension: 0, xAxisID: 'xCcass', order: 1,
        },
        {
          type: 'line', label: 'CCASS Δ 5日均 (M股)',
          data: ccassA,
          borderColor: CCASS_DASH, backgroundColor: 'transparent',
          borderWidth: 1.5, borderDash: [5, 4], pointRadius: 2, pointBackgroundColor: CCASS_DASH,
          tension: 0, xAxisID: 'xCcass', order: 2,
        },
      ]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0a0d12',
          borderColor: '#1e2535', borderWidth: 1,
          titleColor: '#e8eeff', bodyColor: '#6b7a9e',
          padding: 10,
          callbacks: {
            title: items => {
              const x = s[items[0].dataIndex];
              return `${x.code} ${x.name}  [${x.insight}]`;
            },
            label: ctx => {
              const v = ctx.parsed.x;
              if (ctx.datasetIndex === 0) return ` 成交額: ${v.toLocaleString()}M HKD`;
              if (ctx.datasetIndex === 1) return ` 沽空率: ${v.toFixed(1)}%`;
              if (ctx.datasetIndex === 2) return ` 沽空5日均: ${v.toFixed(1)}%`;
              if (ctx.datasetIndex === 3) return ` CCASS Δ: ${v >= 0 ? '+' : ''}${v.toFixed(2)}M`;
              if (ctx.datasetIndex === 4) return ` CCASS均: ${v >= 0 ? '+' : ''}${v.toFixed(2)}M`;
              return '';
            }
          }
        }
      },
      scales: {
        y: {
          grid: { display: false }, border: { display: false },
          ticks: { color: '#6b7a9e', font: { family: "'Noto Sans HK', sans-serif", size: 11 }, crossAlign: 'far' }
        },
        xTurnover: {
          type: 'linear', position: 'top',
          grid: { color: 'rgba(30,37,53,0.8)', drawTicks: false }, border: { display: false },
          ticks: { color: '#378ADD', font: { family: "'DM Mono', monospace", size: 10 },
                   callback: v => v >= 1000 ? (v/1000).toFixed(0)+'B' : v+'M', maxTicksLimit: 6 },
          title: { display: true, text: '成交額 (HKD)', color: '#378ADD', font: { size: 10 } },
        },
        xShort: {
          type: 'linear', position: 'bottom',
          grid: { display: false }, border: { display: false },
          ticks: { color: SHORT_LINE, font: { family: "'DM Mono', monospace", size: 10 },
                   callback: v => v + '%', maxTicksLimit: 6 },
          title: { display: true, text: '沽空率 %', color: SHORT_LINE, font: { size: 10 } },
        },
        xCcass: {
          type: 'linear', position: 'bottom',
          grid: { display: false }, border: { display: false }, offset: true,
          ticks: { color: CCASS_LINE, font: { family: "'DM Mono', monospace", size: 10 },
                   callback: v => (v >= 0 ? '+' : '') + v + 'M', maxTicksLimit: 6 },
          title: { display: true, text: 'CCASS Δ (M股)', color: CCASS_LINE, font: { size: 10 } },
        },
      }
    }
  });
}
// ── TABLE ──────────────────────────────────────────────────────────────────
const STOCK_TYPE_LABEL = { etf:'ETF', stable:'穩定型', bluechip:'藍籌', general:'一般' };
const STOCK_TYPE_STYLE = {
  etf:      'background:rgba(124,106,255,0.15);color:#b8aaff',
  stable:   'background:rgba(61,255,160,0.10);color:#5fffb8',
  bluechip: 'background:rgba(77,159,255,0.12);color:#7db8ff',
  general:  'background:rgba(136,135,128,0.12);color:#9aa0b0',
};

function insightStyle(insight) {
  if (insight.includes('異常高沽空'))  return { chip:'chip-red',   badge:'badge-red'   };
  if (insight.includes('避險盤撤退'))  return { chip:'chip-red',   badge:'badge-red'   };
  if (insight.includes('空頭平倉'))    return { chip:'chip-amber', badge:'badge-amber' };
  if (insight.includes('南向重倉'))    return { chip:'chip-blue',  badge:'badge-blue'  };
  if (insight.includes('機構增持'))    return { chip:'chip-blue',  badge:'badge-blue'  };
  if (insight.includes('沽空偏高'))    return { chip:'chip-amber', badge:'badge-amber' };
  if (insight.includes('沽空偏低'))    return { chip:'chip-green', badge:'badge-green' };
  return { chip:'chip-green', badge:'badge-green' };
}

function deltaClass(n) {
  return n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu';
}

function shortClass(x) {
  // colour short ratio cell relative to stock type's normal ceiling
  const ceilings = { etf:70, stable:10, bluechip:20, general:25 };
  const ceil = ceilings[x.stock_type] || 25;
  if (x.short_ratio > ceil + 15) return 'neg';
  if (x.short_ratio > ceil)      return 'neg' ;
  return '';
}

function renderTable(s) {
  const rows = s.map(x => {
    const dc  = deltaClass(x.ccass_delta);
    const ac  = deltaClass(x.ccass_avg5);
    const sc  = shortClass(x);
    const tv  = x.turnover >= 1e9
      ? (x.turnover/1e9).toFixed(2)+'B'
      : (x.turnover/1e6).toFixed(0)+'M';
    const { badge } = insightStyle(x.insight);
    const typeStyle = STOCK_TYPE_STYLE[x.stock_type] || STOCK_TYPE_STYLE.general;
    const typeLabel = STOCK_TYPE_LABEL[x.stock_type] || x.stock_type;
    const consec    = x.ccass_consec || 0;
    const consecStr = consec === 0 ? '<span style="color:var(--dim)">—</span>'
      : `<span class="${consec > 0 ? 'pos' : 'neg'}" title="CCASS T+2: 反映 ${x.ccass_trade_date||''} 的交易">${consec > 0 ? '+' : ''}${consec}s</span>`;
    return `
      <tr>
        <td class="code-cell">${x.code}</td>
        <td>${x.name}</td>
        <td><span style="font-size:10px;padding:2px 6px;border-radius:4px;${typeStyle}">${typeLabel}</span></td>
        <td class="mono">${tv}</td>
        <td class="mono ${sc}">${x.short_ratio.toFixed(1)}%</td>
        <td class="mono" style="color:var(--dim)">${x.short_avg5.toFixed(1)}%</td>
        <td class="mono" style="color:var(--dim)" title="T-2 沽空率 (${x.ccass_trade_date||''})">${x.short_ratio_t2 != null ? x.short_ratio_t2.toFixed(1)+'%' : '—'}</td>
        <td class="mono ${dc}">${fmtSh(x.ccass_delta)}</td>
        <td class="mono ${ac}">${fmtSh(x.ccass_avg5)}</td>
        <td class="mono">${consecStr}</td>
        <td><span class="badge ${badge}">${x.insight}</span></td>
      </tr>
    `;
  }).join('');

  document.getElementById('tbl-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>代號</th>
          <th>名稱</th>
          <th>類型</th>
          <th>成交額</th>
          <th>沽空率</th>
          <th>5日均</th>
          <th title="CCASS T+2 對應日沽空率">T-2沽空</th>
          <th>CCASS Δ</th>
          <th>均Δ×5</th>
          <th title="連續結算日 (每日=2交易日)">連續(s)</th>
          <th>信號</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ── INIT ───────────────────────────────────────────────────────────────────
setInterval(load, 300000);
load();
</script>
