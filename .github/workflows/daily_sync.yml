name: Daily Sync

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 12:00 UTC / 20:00 HKT (Mon–Fri)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Commit updated data
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          for f in data.json short_history.json ccass_history.json daily_turnover_history.json rank_history.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || (git commit -m "Update data: $(date +'%Y-%m-%d %H:%M')" && git push)
