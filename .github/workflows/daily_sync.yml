name: Daily Sync

on:
  schedule:
    - cron: '40 9 * * 1-5' # 17:40 HKT (Hong Kong time, Mon-Fri)
  workflow_dispatch: # manual run

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r requirements.txt

      # 4️⃣ Download SFC short sell CSV
      - name: Download SFC CSV
        run: |
          DATE=$(date +'%Y%m%d')
          echo "Downloading SFC short sell CSV for $DATE"
          curl -o sfc_short_$DATE.csv "https://www.sfc.hk/edistributionWeb/api/short_selling?date=$DATE"

      # 5️⃣ Run Analysis
      - name: Run Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      # 6️⃣ Commit updated data.json
      - name: Commit updated data
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Update Data: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
